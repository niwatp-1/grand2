        ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

        @keyframes pulse-ring { 0% { transform: scale(1); opacity:.6; } 100% { transform: scale(1.5); opacity:0; } }

        .btn-ghost:hover { border-color:var(--gold); color:var(--gold); }

        .nav-item { padding:10px 14px; border-radius:10px; display:flex; align-items:center; gap:8px; cursor:pointer; transition: all .2s; font-size:14px; color:var(--text-secondary); border:1px solid transparent; white-space:nowrap; }
        .nav-item:hover { background:var(--bg-raised); color:var(--text-primary); }
        .nav-item.active { background:linear-gradient(135deg, rgba(201,168,76,.15), rgba(201,168,76,.05)); border-color:var(--border-gold); color:var(--gold); }

        .modal-box { background:var(--bg-surface); border:1px solid var(--border); border-radius:16px; width:100%; max-width:440px; max-height:92vh; display:flex; flex-direction:column; overflow:hidden; } @media(max-width:480px){ .modal-box { border-radius:14px 14px 0 0; position:fixed; bottom:0; left:0; right:0; max-width:100%; max-height:85vh; } .modal-backdrop { align-items:flex-end; padding:0; } }

        .data-table td { padding:10px 14px; border-bottom:1px solid var(--border); }
